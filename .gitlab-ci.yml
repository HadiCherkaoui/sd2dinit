stages:
  - test
  - build
  - release
  - publish

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  PACKAGE_NAME: "sd2dinit"
  BINARY_NAME: "sd2dinit-linux-x86_64"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/registry/
    - .cargo/git/
    - target/

# ── Test (every push) ────────────────────────────────────────────────────────

test:
  stage: test
  image: rust:latest
  script:
    - cargo test --locked

# ── Build static binary (tags only) ─────────────────────────────────────────

build-linux-x64:
  stage: build
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - rustup target add x86_64-unknown-linux-musl
    - apt-get update -qq && apt-get install -y -qq musl-tools
  script:
    - cargo build --release --locked --target x86_64-unknown-linux-musl
    # strip = true in Cargo.toml [profile.release] handles symbol stripping
    - cp target/x86_64-unknown-linux-musl/release/sd2dinit "$BINARY_NAME"
  artifacts:
    name: "$BINARY_NAME-$CI_COMMIT_TAG"
    paths:
      - "$BINARY_NAME"
    expire_in: 90 days

# ── GitLab Release (tags only) ───────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: build-linux-x64
      artifacts: true
  before_script:
    # release-cli image is Alpine-based — curl is not pre-installed
    - apk add --no-cache curl
  script:
    # Upload binary to GitLab Generic Packages Registry
    - |
      curl --fail --silent \
           --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file "$BINARY_NAME" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}"
    - echo "Binary uploaded"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "sd2dinit $CI_COMMIT_TAG"
    description: |
      ## sd2dinit $CI_COMMIT_TAG

      Converts systemd `.service` unit files into dinit service files.
      Runs standalone or as a pacman/alpm hook for automatic conversion.

      ### Install

      ```sh
      curl -fsSL $CI_PROJECT_URL/-/raw/main/install.sh | sh
      ```

      Installs to `/usr/local/bin/sd2dinit` using `doas` or `sudo`.
      Pass `--no-hook` to skip the pacman hook, or `--version $CI_COMMIT_TAG` to pin this version.

      ### Or via cargo

      ```sh
      cargo install sd2dinit
      # then install the hook manually:
      doas install -Dm644 /path/to/hooks/sd2dinit.hook /usr/share/libalpm/hooks/
      ```

      ### Quick start

      ```sh
      sd2dinit convert /usr/lib/systemd/system/sshd.service --dry-run
      doas sd2dinit install /usr/lib/systemd/system/nginx.service --enable --start
      ```
    assets:
      links:
        - name: "$BINARY_NAME"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}"
          link_type: package
        - name: "install.sh"
          url: "$CI_PROJECT_URL/-/raw/$CI_COMMIT_TAG/install.sh"
          link_type: other

# ── Publish to crates.io (tags only) ─────────────────────────────────────────
# Requires CARGO_REGISTRY_TOKEN set in GitLab CI/CD → Settings → Variables

publish-crate:
  stage: publish
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - job: test
    - job: release
  script:
    # CARGO_REGISTRY_TOKEN is read from the environment automatically.
    # --allow-dirty is needed because CARGO_HOME=$CI_PROJECT_DIR/.cargo puts
    # the registry cache inside the git tree; those files are not source changes.
    - cargo publish --locked --allow-dirty
